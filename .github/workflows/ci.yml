name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Auth.js v5 requires AUTH_SECRET to be present at build time.
        # This is a non-sensitive dummy value used only to satisfy the
        # build step in CI; it is never used to sign real sessions.
        env:
          AUTH_SECRET: ci-dummy-secret-for-build-only-do-not-use
        run: npm run build
